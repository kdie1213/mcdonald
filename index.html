<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kdie Plushie [IN STOCK]</title>
  <meta name="description" content="Kdie Plushie" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══ HEADER ══ -->
  <header class="header" style="border-bottom: none;">
    <div class="header-wrap" style="padding: 0; display: flex; justify-content: center;">
      <img src="images/top.png" alt="Header Banner" style="width: 100%; height: auto; display: block;" onerror="this.onerror=null; this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'1200\' height=\'60\'><rect width=\'1200\' height=\'60\' fill=\'%23f0f0f0\'/><text x=\'50%\' y=\'50%\' dominant-baseline=\'middle\' text-anchor=\'middle\' font-size=\'16\' fill=\'%23888\'>Please save your image as happy-meal/images/top.png</text></svg>'" />
    </div>
  </header>

  <!-- ══ BREADCRUMB ══ -->
  <div class="breadcrumb">
    <a href="#">Home</a>
    <span>›</span>
    <a href="#">All Drops</a>
    <span>›</span>
    <span class="bc-current">Kdie Plushie [IN STOCK]</span>
  </div>

  <!-- ══ PRODUCT ══ -->
  <div class="product-wrap">
    <div class="product-grid">

      <!-- LEFT — Gallery -->
      <div class="gallery">
        <div class="main-img-box">
          <img
            id="mainImg"
            src="images/kdie.png"
            alt="Kdie Plushie"
            class="main-img"
          />
        </div>
      </div>

      <!-- RIGHT — Info -->
      <div class="product-info">

        <h1 class="prod-title">Kdie Plushie</h1>

        <div class="price-row">
          <span class="price">Free</span>
          <span class="badge-status">In Stock</span>
        </div>

        <!-- Stock bar -->
        <div class="stock-wrap">
          <p class="stock-label">Only <strong id="stockNum">67,000</strong> left — act fast 😳</p>
          <div class="stock-track"><div class="stock-fill" id="stockFill"></div></div>
        </div>

        <!-- BIG CTA BUTTON -->
        <button class="cta-btn" id="ctaBtn" onclick="addToCart()">ORDER NOW</button>

      </div>
    </div>
  </div>

  <!-- BACK BTN -->
  <div class="back-wrap">
    <a href="#" class="back-btn">← BACK TO ALL DROPS</a>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- ══ FOOTER ══ -->
  <footer class="footer">
    <div class="footer-links">
      <a href="#">Terms of Service</a>
      <a href="#">Privacy Policy</a>
      <a href="#">Refund Policy</a>
      <a href="#">Contact</a>
      <a href="#">Your Privacy Choices 🔵</a>
    </div>
  </footer>

  <!-- DLC MODAL -->
  <div class="dlc-overlay" id="dlcOverlay" style="display: none;">
    <div class="dlc-modal">
      <button class="dlc-close" onclick="closeDlcModal()">✕</button>
      <h2>DLC Code</h2>
      <p class="dlc-thanks">Thanks for buying ❤️</p>
      <div class="dlc-code-box">
        <span id="dlcCodeText">XXXX-XXXX</span>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
